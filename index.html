<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DepoSay - Saf</title>
    <script src="https://docs.opencv.org/4.5.0/opencv.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; }
        canvas { width: 90%; margin-top: 20px; border: 2px solid #2979ff; }
        input { margin: 20px; }
    </style>
</head>
<body>
    <h1>DepoSay - Saf Sürüm</h1>
    <input type="file" id="fileInput" accept="image/*" capture="environment">
    <br>
    <canvas id="canvas"></canvas>

    <script>
        document.getElementById('fileInput').addEventListener('change', (e) => {
            let reader = new FileReader();
            reader.onload = function(event) {
                let img = new Image();
                img.onload = function() {
                    let canvas = document.getElementById('canvas');
                    let ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    // OpenCV ile işle
                    let src = cv.imread(canvas);
                    let dst = new cv.Mat();
                    let gray = new cv.Mat();
                    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                    cv.Canny(gray, dst, 50, 150);

                    let contours = new cv.MatVector();
                    let hierarchy = new cv.Mat();
                    cv.findContours(dst, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                    for (let i = 0; i < contours.size(); ++i) {
                        let rect = cv.boundingRect(contours.get(i));
                        if (rect.width > 50 && rect.height > 50) {
                            cv.rectangle(src, new cv.Point(rect.x, rect.y), 
                                         new cv.Point(rect.x + rect.width, rect.y + rect.height), 
                                         [0, 255, 0, 255], 5);
                        }
                    }
                    cv.imshow('canvas', src);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });
    </script>
</body>
</html>
