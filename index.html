<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DepoSay - Ultra Kararlı</title>
    <script src="https://docs.opencv.org/4.5.0/opencv.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; }
        #video { display: none; }
        #canvas { width: 100%; max-width: 500px; border: 3px solid #00c853; }
        .info { color: #fff; padding: 10px; font-family: sans-serif; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="info">Sistem tarıyor... Lütfen bekleyin.</div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; });

        // Safari için "kilitlenmeyen" aralıklı işleme
        setInterval(async () => {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);

                let src = cv.imread(canvas);
                let gray = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                cv.Canny(gray, gray, 50, 150);

                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(gray, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                // Sadece kareleri çiz
                for (let i = 0; i < contours.size(); ++i) {
                    let rect = cv.boundingRect(contours.get(i));
                    if (rect.width > 50 && rect.height > 50) {
                        ctx.strokeStyle = '#00FF00';
                        ctx.lineWidth = 4;
                        ctx.strokeRect(rect.x, rect.y, rect.width, rect.height);
                    }
                }
                src.delete(); gray.delete(); contours.delete(); hierarchy.delete();
            }
        }, 500); // Yarım saniyede bir tarar (Asla donmaz)
    </script>
</body>
</html>
