<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DepoSay Pro - Tetiklemeli</title>
    <script src="https://docs.opencv.org/4.5.0/opencv.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; }
        #video { width: 100%; max-width: 500px; border: 3px solid #555; }
        #canvas { display: none; }
        .btn { padding: 25px; width: 90%; background: #00c853; border: none; color: white; font-size: 20px; font-weight: bold; border-radius: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <button class="btn" onclick="captureAndProcess()">📸 FOTOĞRAF ÇEK VE SAY</button>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; });

        function captureAndProcess() {
            // Anlık görüntüyü yakala
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // OpenCV'ye aktar
            let src = cv.imread(canvas);
            let gray = new cv.Mat();
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
            cv.medianBlur(gray, gray, 7);
            cv.Canny(gray, gray, 50, 150);

            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();
            cv.findContours(gray, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                let perimeter = cv.arcLength(cnt, true);
                let circularity = (4 * Math.PI * area) / (perimeter * perimeter);
                
                if (area > 800 && circularity > 0.6) {
                    let rect = cv.boundingRect(cnt);
                    ctx.strokeStyle = '#00FF00';
                    ctx.lineWidth = 5;
                    ctx.strokeRect(rect.x, rect.y, rect.width, rect.height);
                }
            }
            // Görüntüyü videonun yerine canvas'a bas
            video.style.display = 'none';
            canvas.style.display = 'block';
            src.delete(); gray.delete(); contours.delete(); hierarchy.delete();
        }
    </script>
</body>
</html>
