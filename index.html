<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DepoSay - Canlı</title>
    <script src="https://docs.opencv.org/4.5.0/opencv.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; margin: 0; }
        #canvas { width: 100%; position: absolute; top: 0; left: 0; }
        #video { display: none; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; });

        // Safari'nin donmasını engelleyen "Aralıklı İşleme" sistemi
        setInterval(() => {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                
                let src = cv.imread(canvas);
                let gray = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                cv.Canny(gray, gray, 50, 150);

                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(gray, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                for (let i = 0; i < contours.size(); ++i) {
                    let rect = cv.boundingRect(contours.get(i));
                    if (rect.width > 50 && rect.height > 50) {
                        ctx.strokeStyle = '#00FF00';
                        ctx.lineWidth = 5;
                        ctx.strokeRect(rect.x, rect.y, rect.width, rect.height);
                    }
                }
                src.delete(); gray.delete(); contours.delete(); hierarchy.delete();
            }
        }, 300); // Her 300ms'de bir kare işler (Donmayı önler)
    </script>
</body>
</html>
