<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DepoSay AI</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background: #111;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            text-align: center;
            box-sizing: border-box;
        }
        
        h1 { 
            margin: 10px 0; 
            font-size: 20px; 
        }

        #status { 
            color: #aaa; 
            font-size: 13px; 
            margin-bottom: 10px; 
            padding: 0 5px;
        }

        /* Mobil Uyumlu Kutu Düzeni (Esnek ve Sığan Tasarım) */
        .preview-box {
            display: flex;
            flex-direction: column; /* Mobilde alt alta sıralar */
            gap: 10px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .box {
            width: 100%;
            box-sizing: border-box;
        }

        .box h3 {
            margin: 5px 0;
            font-size: 14px;
            color: #ccc;
        }

        video, canvas {
            width: 100%;
            height: auto; /* Orantılı küçülme sağlar */
            border-radius: 12px;
            display: block;
            background: #222;
        }

        /* Butonlar */
        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            width: 100%; /* Telefon ekranını tam kaplasın */
            max-width: 300px;
            margin: 5px auto;
            box-sizing: border-box;
        }
        
        #switchBtn { background: #2979ff; }
        #sayBtn { background: #00c853; font-size: 20px; padding: 15px; margin-top: 10px; }

        #count {
            font-size: 60px;
            margin: 10px 0;
            font-weight: bold;
            color: #00c853;
        }

        /* Kontrol Paneli Düzenlemesi */
        .controls {
            margin: 15px auto;
            background: #222;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-radius: 12px;
            text-align: left;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        input[type="range"] { 
            width: 50%; 
            max-width: 180px;
        }

        select { 
            padding: 6px; 
            background: #333; 
            color: white; 
            border: 1px solid #555; 
            border-radius: 8px;
            width: 55%;
            max-width: 220px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <h1>📷 DepoSay AI</h1>
    <div id="status">Kamera başlatılıyor...</div>
    
    <button id="switchBtn" onclick="switchCamera()">🔄 KAMERAYI DEĞİŞTİR</button>

    <div class="preview-box">
        <div class="box">
            <h3>Canlı Kamera</h3>
            <video id="camera" autoplay playsinline muted></video>
        </div>
        <div class="box">
            <h3>Yapay Zeka Görünümü</h3>
            <canvas id="canvasOutput"></canvas>
        </div>
    </div>

    <canvas id="canvasInput" style="display:none;"></canvas>

    <div class="controls">
        <div class="control-row">
            <label>🎯 Kontrast: </label>
            <select id="modeSelect" onchange="countObjects()">
                <option value="darkOnLight">Zeminden DAHA KOYU Nesneler</option>
                <option value="lightOnDark">Zeminden DAHA AÇIK Nesneler</option>
            </select>
        </div>
        <div class="control-row">
            <label>🎚️ Hassasiyet: </label>
            <input type="range" id="thresholdSlider" min="0" max="255" value="110" onchange="countObjects()">
        </div>
        <div class="control-row">
            <label>📐 Min Boyut: </label>
            <input type="range" id="minSizeSlider" min="5" max="600" value="50" onchange="countObjects()">
        </div>
    </div>
    
    <button id="sayBtn" onclick="countObjects()">MALZEMELERİ SAY</button>

    <div id="count">0</div>

    <script>
        const video = document.getElementById("camera");
        const canvasInput = document.getElementById("canvasInput");
        const canvasOutput = document.getElementById("canvasOutput");
        const statusDiv = document.getElementById("status");
        
        let currentStream = null;
        let useRearCamera = true;

        function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    facingMode: useRearCamera ? "environment" : "user",
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                }
            };

            navigator.mediaDevices.getUserMedia(constraints)
            .then(stream => { 
                currentStream = stream;
                video.srcObject = stream; 
                video.play();
                statusDiv.innerHTML = `Hazır. (${useRearCamera ? 'Arka Kamera' : 'Ön Kamera'})`;
            })
            .catch(err => { 
                statusDiv.innerHTML = "Kamera açılmadı. İzinleri kontrol edin."; 
            });
        }

        function switchCamera() {
            useRearCamera = !useRearCamera;
            startCamera();
        }

        startCamera();

        function countObjects() {
            const width = video.videoWidth || 640;
            const height = video.videoHeight || 480;
            
            canvasInput.width = width;
            canvasInput.height = height;
            canvasOutput.width = width;
            canvasOutput.height = height;
            
            const ctxInput = canvasInput.getContext("2d");
            const ctxOutput = canvasOutput.getContext("2d");
            
            ctxInput.drawImage(video, 0, 0, width, height);
            const imgData = ctxInput.getImageData(0, 0, width, height);
            const data = imgData.data;
            
            const threshVal = parseInt(document.getElementById("thresholdSlider").value);
            const minSize = parseInt(document.getElementById("minSizeSlider").value);
            const mode = document.getElementById("modeSelect").value;
            
            let binaryMatrix = Array(height).fill().map(() => Array(width).fill(0));
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;
                    const r = data[idx];
                    const g = data[idx + 1];
                    const b = data[idx + 2];
                    const brightness = (r + g + b) / 3;
                    
                    let isTarget = false;
                    if (mode === "darkOnLight") {
                        if (brightness < threshVal) isTarget = true;
                    } else {
                        if (brightness > threshVal) isTarget = true;
                    }
                    
                    if (isTarget) {
                        binaryMatrix[y][x] = 1;
                        data[idx] = 0; data[idx+1] = 255; data[idx+2] = 0;
                    } else {
                        binaryMatrix[y][x] = 0;
                    }
                }
            }
            
            let visited = Array(height).fill().map(() => Array(width).fill(false));
            let objectCount = 0;
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    if (binaryMatrix[y][x] === 1 && !visited[y][x]) {
                        let queue = [[x, y]];
                        visited[y][x] = true;
                        let size = 0;
                        
                        while (queue.length > 0) {
                            let [cx, cy] = queue.shift();
                            size++;
                            
                            let neighbors = [[cx+1, cy], [cx-1, cy], [cx, cy+1], [cx, cy-1]];
                            for (let [nx, ny] of neighbors) {
                                if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                                    if (binaryMatrix[ny][nx] === 1 && !visited[ny][nx]) {
                                        visited[ny][nx] = true;
                                        queue.push([nx, ny]);
                                    }
                                }
                            }
                        }
                        if (size > minSize && size < 20000) {
                            objectCount++;
                        }
                    }
                }
            }
            
            ctxOutput.putImageData(imgData, 0, 0);
            document.getElementById("count").innerHTML = objectCount;
            statusDiv.innerHTML = `Sayım: ${objectCount} nesne algılandı.`;
        }
    </script>
</body>
</html>
